name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Build Server
        run: |
          cd server
          pnpm install
          pnpm run build
          # 创建 server 发布包
          mkdir -p release/server
          cp -r dist release/server/
          cp package.json release/server/
          cp .env.example release/server/
          # 创建 data 目录结构
          mkdir -p release/server/data

      - name: Build Web
        run: |
          cd web
          pnpm install
          pnpm run build
          # 创建 web 发布包
          mkdir -p release/web
          cp -r dist release/web/
          cp package.json release/web/

      - name: Create Zip Archives
        run: |
          cd release
          # 创建 server 压缩包
          zip -r ../aria2-server.zip server/
          # 创建 web 压缩包
          zip -r ../aria2-web.zip web/
          # 创建完整压缩包
          cd ..
          zip -r aria2-full.zip release/

      - name: Upload Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria2-server
          path: aria2-server.zip

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria2-web
          path: aria2-web.zip

      - name: Upload Full Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria2-full
          path: aria2-full.zip

      - name: Create Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            aria2-server.zip
            aria2-web.zip
            aria2-full.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}