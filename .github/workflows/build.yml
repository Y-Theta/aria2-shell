name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build Server
        run: |
          cd server
          npm install
          npm run build
          # 创建 server 发布包
          mkdir -p ../release/server
          cp -r dist ../release/server/
          cp package.json ../release/server/
          cp .env.example ../release/server/
          # 创建 data 目录结构
          mkdir -p ../release/server/data

      - name: Upload Server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: release/server

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build Web
        run: |
          cd web
          npm install
          npm run build
          # 创建 web 发布包
          mkdir -p ../release/web
          cp -r dist ../release/web/
          cp package.json ../release/web/

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: release/web

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-server, build-web]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Server build
        uses: actions/download-artifact@v4
        with:
          name: server-build
          path: release/server

      - name: Download Web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: release/web

      - name: Create Zip Archives
        run: |
          cd release
          # 创建 server 压缩包
          zip -r ../aria2-server.zip server/
          # 创建 web 压缩包
          zip -r ../aria2-web.zip web/
          # 创建完整压缩包
          cd ..
          zip -r aria2-full.zip release/

      - name: Upload Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria2-server
          path: aria2-server.zip

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria2-web
          path: aria2-web.zip

      - name: Upload Full Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria2-full
          path: aria2-full.zip

      - name: Create Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            aria2-server.zip
            aria2-web.zip
            aria2-full.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}